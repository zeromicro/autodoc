name: Sync go-zero release notes

# Triggers:
#   1. Manually via workflow_dispatch
#   2. On a schedule (weekly check)
#   3. Via repository_dispatch from a webhook in zeromicro/go-zero (optional)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'go-zero release tag to sync (e.g. v1.7.3). Leave empty for latest.'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 1'   # every Monday 02:00 UTC
  repository_dispatch:
    types: [go-zero-release]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch go-zero latest release info
        id: release
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(curl -sL https://api.github.com/repos/zeromicro/go-zero/releases/latest | jq -r .tag_name)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          BODY=$(curl -sL "https://api.github.com/repos/zeromicro/go-zero/releases/tags/$TAG" | jq -r .body)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry with AI (GitHub Models)
        id: ai
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # automatically provided, no extra secret needed
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
        run: |
          PROMPT="You are a technical writer for go-zero documentation. Based on the following release notes for ${RELEASE_TAG}, write a concise Markdown changelog entry suitable for a documentation site. Use third-person present tense, keep it under 300 words, group changes under headings (New Features, Bug Fixes, Breaking Changes). Release notes:\n\n${RELEASE_BODY}"

          # GitHub Models endpoint — available to GitHub Copilot subscribers
          # Uses GITHUB_TOKEN directly, no OPENAI_API_KEY needed
          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg p "$PROMPT" '{model:"claude-sonnet-4-6",messages:[{role:"user",content:$p}],max_tokens:600}')" \
            | jq -r '.choices[0].message.content')

          # Prepend to changelog file
          CHANGELOG="src/content/docs/reference/changelog.md"
          TAG="${RELEASE_TAG}"
          DATE=$(date +%Y-%m-%d)
          ENTRY="## ${TAG} – ${DATE}\n\n${RESPONSE}\n\n"
          TMPFILE=$(mktemp)
          printf "${ENTRY}" > "$TMPFILE"
          # Insert after frontmatter (after second ---)
          awk '/^---/{n++} n==2{print; while((getline line < "'$TMPFILE'") > 0) print line; n=99; next} {print}' "$CHANGELOG" > /tmp/merged.md
          mv /tmp/merged.md "$CHANGELOG"
          echo "entry_added=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.ai.outputs.entry_added == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/go-zero-${{ steps.release.outputs.tag }}
          commit-message: "docs: sync go-zero ${{ steps.release.outputs.tag }} release notes"
          title: "docs: sync go-zero ${{ steps.release.outputs.tag }} release notes"
          body: |
            Automated PR generated by the `sync-release.yml` workflow.

            **go-zero release:** `${{ steps.release.outputs.tag }}`

            Please review the generated changelog entry before merging.
          labels: automated, documentation
