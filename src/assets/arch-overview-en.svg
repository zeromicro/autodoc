<svg viewBox="0 0 750 400" width="750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }</style>

  <!-- Row 1: Client — x=275, y=20, w=200, h=36, bottom=56 -->
  <rect x="275" y="20" width="200" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="375" y="43" font-size="12" fill="#1e40af" text-anchor="middle">Browser / Mobile App</text>

  <!-- Arrow: Client → Gateway — start=61, end=78 -->
  <path d="M375,61 Q375,69 375,78" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: API Gateway — x=195, y=85, w=360, h=48, bottom=133 -->
  <rect x="195" y="85" width="360" height="48" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="375" y="106" font-size="12" font-weight="600" fill="#b45309" text-anchor="middle">go-zero API Gateway (rest.Server)</text>
  <text x="375" y="122" font-size="10" fill="#b45309" text-anchor="middle">REST / HTTP · JWT Auth · Rate Limit · Middleware</text>

  <!-- Arrows: Gateway → 3 RPCs — start=138, end=148 -->
  <path d="M300,138 C300,148 190,148 190,148" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M375,138 Q375,143 375,148" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M450,138 C450,148 560,148 560,148" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: RPC Services — y=155, h=44, bottom=199 -->
  <!-- Box 1: User RPC — x=110, w=160, center=190 -->
  <rect x="110" y="155" width="160" height="44" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="190" y="174" font-size="12" fill="#166534" text-anchor="middle">User RPC</text>
  <text x="190" y="190" font-size="10" fill="#166534" text-anchor="middle">gRPC / zrpc</text>

  <!-- Box 2: Order RPC — x=295, w=160, center=375 -->
  <rect x="295" y="155" width="160" height="44" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="375" y="174" font-size="12" fill="#166534" text-anchor="middle">Order RPC</text>
  <text x="375" y="190" font-size="10" fill="#166534" text-anchor="middle">gRPC / zrpc</text>

  <!-- Box 3: Product RPC — x=480, w=160, center=560 -->
  <rect x="480" y="155" width="160" height="44" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="174" font-size="12" fill="#166534" text-anchor="middle">Product RPC</text>
  <text x="560" y="190" font-size="10" fill="#166534" text-anchor="middle">gRPC / zrpc</text>

  <!-- Arrows: RPCs → Infrastructure — start=204, end=232 -->
  <path d="M190,204 C190,218 138,218 138,232" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M200,204 C200,222 296,222 296,232" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <path d="M375,204 C375,218 454,218 454,232" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M560,204 C560,218 612,218 612,232" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 4: Infrastructure — y=239, h=44, bottom=283 -->
  <!-- Box 1: MySQL — x=68, w=140, center=138 -->
  <rect x="68" y="239" width="140" height="44" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="138" y="258" font-size="12" fill="#6b21a8" text-anchor="middle">MySQL</text>
  <text x="138" y="274" font-size="10" fill="#6b21a8" text-anchor="middle">Database</text>

  <!-- Box 2: Redis — x=226, w=140, center=296 -->
  <rect x="226" y="239" width="140" height="44" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="296" y="258" font-size="12" fill="#6b21a8" text-anchor="middle">Redis</text>
  <text x="296" y="274" font-size="10" fill="#6b21a8" text-anchor="middle">Cache</text>

  <!-- Box 3: Kafka — x=384, w=140, center=454 -->
  <rect x="384" y="239" width="140" height="44" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="454" y="258" font-size="12" fill="#6b21a8" text-anchor="middle">Kafka</text>
  <text x="454" y="274" font-size="10" fill="#6b21a8" text-anchor="middle">Message Queue</text>

  <!-- Box 4: etcd — x=542, w=140, center=612 -->
  <rect x="542" y="239" width="140" height="44" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="612" y="258" font-size="12" fill="#6b21a8" text-anchor="middle">etcd</text>
  <text x="612" y="274" font-size="10" fill="#6b21a8" text-anchor="middle">Service Registry</text>

  <!-- Divider -->
  <line x1="40" y1="305" x2="710" y2="305" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="375" y="322" font-size="10" fill="#94a3b8" text-anchor="middle">Observability (auto-instrumented)</text>

  <!-- Row 5: Observability — y=335, h=44, bottom=379 -->
  <rect x="75" y="335" width="170" height="44" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="160" y="354" font-size="12" fill="#9d174d" text-anchor="middle">Prometheus</text>
  <text x="160" y="370" font-size="10" fill="#9d174d" text-anchor="middle">Metrics</text>

  <rect x="290" y="335" width="170" height="44" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="375" y="354" font-size="12" fill="#9d174d" text-anchor="middle">Jaeger / Zipkin</text>
  <text x="375" y="370" font-size="10" fill="#9d174d" text-anchor="middle">Distributed Tracing</text>

  <rect x="505" y="335" width="170" height="44" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="590" y="354" font-size="12" fill="#9d174d" text-anchor="middle">ELK / Loki</text>
  <text x="590" y="370" font-size="10" fill="#9d174d" text-anchor="middle">Log Aggregation</text>
</svg>
