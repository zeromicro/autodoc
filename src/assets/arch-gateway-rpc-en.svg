<svg viewBox="0 0 750 200" width="750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }</style>

  <!-- === API Service group — x=15, y=15, w=260, h=170 === -->
  <rect x="15" y="15" width="260" height="170" rx="8" fill="#fef3c7" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="145" y="35" font-size="10" fill="#b45309" text-anchor="middle" font-weight="600">API Service</text>

  <!-- Router — x=35, y=45, w=90, h=36 -->
  <rect x="35" y="45" width="90" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="80" y="68" font-size="11" fill="#b45309" text-anchor="middle">Router</text>

  <!-- Arrow Router → Handler -->
  <path d="M130,63 Q140,63 148,63" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Handler — x=155, y=45, w=90, h=36 -->
  <rect x="155" y="45" width="90" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="200" y="68" font-size="11" fill="#b45309" text-anchor="middle">Handler</text>

  <!-- Arrow Handler → Logic -->
  <path d="M200,86 Q200,95 200,103" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Logic — x=145, y=110, w=110, h=36 -->
  <rect x="145" y="110" width="110" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="200" y="133" font-size="11" fill="#b45309" text-anchor="middle">Logic</text>

  <!-- Arrow Logic → ServiceContext -->
  <path d="M200,151 Q200,159 200,163" fill="none" stroke="#64748b" stroke-width="1.2"/>

  <!-- === ServiceContext group — x=15, y=165 (invisible, connects to RPC clients) === -->

  <!-- Arrow Logic → RPC clients (goes right out of API Service) -->
  <path d="M260,128 Q280,128 298,128" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="121" font-size="8" fill="#94a3b8" text-anchor="middle">ServiceContext</text>

  <!-- === RPC Clients group — x=305, y=15, w=155, h=170 === -->
  <rect x="305" y="15" width="155" height="170" rx="8" fill="#d1fae5" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="382" y="35" font-size="10" fill="#166534" text-anchor="middle" font-weight="600">zrpc Clients</text>

  <!-- UserRpc client — x=320, y=48, w=125, h=32 -->
  <rect x="320" y="48" width="125" height="32" rx="5" fill="#d1fae5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="382" y="69" font-size="10" fill="#166534" text-anchor="middle">UserRpc client</text>

  <!-- OrderRpc client — x=320, y=92, w=125, h=32 -->
  <rect x="320" y="92" width="125" height="32" rx="5" fill="#d1fae5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="382" y="113" font-size="10" fill="#166534" text-anchor="middle">OrderRpc client</text>

  <!-- P2C Load Balancer — x=320, y=140, w=125, h=32 -->
  <rect x="320" y="140" width="125" height="32" rx="5" fill="#d1fae5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="382" y="157" font-size="9" fill="#166534" text-anchor="middle">P2C Load Balancer</text>

  <!-- Arrows: clients → LB -->
  <path d="M382,80 Q382,85 382,85" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M382,124 Q382,130 382,133" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- Arrow: LB → etcd Discovery -->
  <path d="M450,156 Q468,156 478,156" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === etcd Discovery — x=485, y=35, w=100, h=155 === -->
  <rect x="485" y="35" width="100" height="145" rx="8" fill="#f3e8ff" fill-opacity="0.15" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="535" y="55" font-size="10" fill="#6b21a8" text-anchor="middle" font-weight="600">etcd Discovery</text>

  <text x="535" y="108" font-size="20" fill="#a855f7" text-anchor="middle">⟳</text>
  <text x="535" y="128" font-size="9" fill="#6b21a8" text-anchor="middle">watch &amp; resolve</text>

  <!-- Arrow: etcd → RPC Services -->
  <path d="M590,100 Q608,100 618,100" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- === RPC Services — x=625, y=35, w=110, h=145 === -->
  <rect x="625" y="35" width="110" height="145" rx="8" fill="#dbeafe" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="680" y="55" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="600">RPC Services</text>

  <!-- Instance boxes -->
  <rect x="640" y="68" width="80" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="680" y="87" font-size="9" fill="#1e40af" text-anchor="middle">user-rpc :8081</text>

  <rect x="640" y="106" width="80" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="680" y="125" font-size="9" fill="#1e40af" text-anchor="middle">order-rpc :8082</text>

  <rect x="640" y="144" width="80" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="680" y="163" font-size="9" fill="#1e40af" text-anchor="middle">product-rpc :8083</text>
</svg>
