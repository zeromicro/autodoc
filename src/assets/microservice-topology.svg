<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="280" rx="12" fill="#f8fafc"/>

  <!-- Title: y = 20 + 16*0.75 = 32 -->
  <text x="350" y="32" font-size="16" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#1e293b">微服务系统拓扑</text>

  <!-- order-api: x=30, y=60, w=120, h=36, right=150, cx=90, bottom=96 -->
  <rect x="30" y="60" width="120" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="83" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#1e40af">order-api</text>

  <!-- Arrow: order-api → order-rpc, start=150+5=155, end=210-7=203 -->
  <path d="M155,78 Q 179,78 203,78" fill="none" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- order-rpc: x=210, y=60, w=130, h=36, right=340, cx=275, bottom=96 -->
  <rect x="210" y="60" width="130" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="275" y="83" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#b45309">order-rpc</text>

  <!-- Arrow: order-rpc → MySQL (top), start=340+5=345, end=420-7=413 -->
  <path d="M345,78 Q 379,78 413,78" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- MySQL (top): x=420, y=60, w=100, h=36, cx=470, bottom=96 -->
  <rect x="420" y="60" width="100" height="36" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="470" y="83" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">MySQL</text>

  <!-- Arrow: order-rpc → inventory-rpc, start=96+5=101, end=136-7=129 -->
  <path d="M275,101 Q 275,115 275,129" fill="none" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arrow-purple)"/>

  <!-- inventory-rpc: x=210, y=136, w=130, h=36, right=340, cx=275, bottom=172 -->
  <rect x="210" y="136" width="130" height="36" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="275" y="159" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#6b21a8">inventory-rpc</text>

  <!-- Arrow: inventory-rpc → Redis, start=340+5=345, end=420-7=413 -->
  <path d="M345,154 Q 379,154 413,154" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Redis: x=420, y=136, w=100, h=36, cx=470, bottom=172 -->
  <rect x="420" y="136" width="100" height="36" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="470" y="159" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#9d174d">Redis</text>

  <!-- Arrow: inventory-rpc → payment-rpc, start=172+5=177, end=212-7=205 -->
  <path d="M275,177 Q 275,191 275,205" fill="none" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arrow-purple)"/>

  <!-- payment-rpc: x=210, y=212, w=130, h=36, right=340, cx=275, bottom=248 -->
  <rect x="210" y="212" width="130" height="36" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="275" y="235" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#6b21a8">payment-rpc</text>

  <!-- Arrow: payment-rpc → MySQL (bottom), start=340+5=345, end=420-7=413 -->
  <path d="M345,230 Q 379,230 413,230" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- MySQL (bottom): x=420, y=212, w=100, h=36, cx=470, bottom=248 -->
  <rect x="420" y="212" width="100" height="36" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="470" y="235" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">MySQL</text>

  <!-- etcd label: x=560, y=90, w=110, h=54, cx=615 -->
  <rect x="560" y="90" width="110" height="54" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="615" y="113" font-size="12" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#64748b">etcd</text>
  <text x="615" y="131" font-size="10" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#94a3b8">服务发现</text>
</svg>
