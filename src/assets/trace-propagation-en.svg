<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" width="700">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="120" rx="12" fill="#f8fafc"/>

  <!-- Title: y = 15 + 16*0.75 = 27 -->
  <text x="350" y="27" font-size="16" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#1e293b">Trace Propagation</text>

  <!-- Client: x=20, y=50, w=80, h=36, right=100, cx=60, bottom=86 -->
  <rect x="20" y="50" width="80" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="73" font-size="12" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#1e40af">Client</text>

  <!-- Arrow: Client → order-api, start=100+5=105, end=150-7=143 -->
  <path d="M105,68 Q 124,68 143,68" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- order-api span A: x=150, y=50, w=140, h=36, right=290, cx=220, bottom=86 -->
  <rect x="150" y="50" width="140" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="220" y="65" font-size="11" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#b45309">order-api</text>
  <text x="220" y="80" font-size="9" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#b45309">span A</text>

  <!-- Arrow: order-api → order-rpc, start=290+5=295, end=340-7=333 -->
  <path d="M295,68 Q 314,68 333,68" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- order-rpc span B: x=340, y=50, w=160, h=36, right=500, cx=420, bottom=86 -->
  <rect x="340" y="50" width="160" height="36" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="420" y="65" font-size="11" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#6b21a8">order-rpc</text>
  <text x="420" y="80" font-size="9" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#6b21a8">span B (child of A)</text>

  <!-- Arrow: order-rpc → DB, start=500+5=505, end=550-7=543 -->
  <path d="M505,68 Q 524,68 543,68" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DB span C: x=550, y=50, w=130, h=36, right=680, cx=615, bottom=86 -->
  <rect x="550" y="50" width="130" height="36" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="615" y="65" font-size="11" font-weight="500" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">DB</text>
  <text x="615" y="80" font-size="9" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">span C (child of B)</text>

  <!-- trace_id label -->
  <text x="350" y="108" font-size="10" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#94a3b8">W3C TraceContext &#8212; same trace_id across all spans</text>
</svg>
