<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="800" height="220" rx="12" fill="#f8fafc"/>
  <!-- Title: y=32 -->
  <text x="400" y="32" font-size="16" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#0f172a">生产部署架构</text>
  <!--
    Row 1: 3 boxes w=240, margin=20, gap=20  x: 20, 280, 540
    y=52, h=60, center_y=82
    text: line1_y=73, line2_y=95
    Arrows horizontal y=82: 260+5=265 → 280-7=273 ; 520+5=525 → 540-7=533
  -->
  <!-- Box 1: Ingress (blue) -->
  <rect x="20" y="52" width="240" height="60" rx="8"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="73" font-size="12" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#1e40af">Ingress</text>
  <text x="140" y="95" font-size="10" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#1e40af">API Gateway</text>
  <!-- Arrow → box2 -->
  <path d="M265,82 Q269,82 273,82" stroke="#64748b" stroke-width="2"
        fill="none" marker-end="url(#arrow)"/>
  <!-- Box 2: go-zero Services (green) -->
  <rect x="280" y="52" width="240" height="60" rx="8"
        fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="73" font-size="12" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#166534">go-zero Services</text>
  <text x="400" y="95" font-size="10" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#166534">API · RPC · Cron · MQ</text>
  <!-- Arrow → box3 -->
  <path d="M525,82 Q529,82 533,82" stroke="#64748b" stroke-width="2"
        fill="none" marker-end="url(#arrow)"/>
  <!-- Box 3: Data Layer (purple) -->
  <rect x="540" y="52" width="240" height="60" rx="8"
        fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="660" y="73" font-size="12" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#6b21a8">Data Layer</text>
  <text x="660" y="95" font-size="10" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#6b21a8">MySQL · Redis · Etcd</text>
  <!--
    Down arrow from row1 center: row1_bottom=112, +5=117 → row2_top=137, -7=130
  -->
  <path d="M400,117 Q400,123 400,130" stroke="#64748b" stroke-width="2"
        fill="none" marker-end="url(#arrow)"/>
  <!-- Row 2: Observability (amber) y=137, w=760, h=54 -->
  <rect x="20" y="137" width="760" height="54" rx="8"
        fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="158" font-size="12" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#b45309">可观测性</text>
  <text x="400" y="178" font-size="10" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif"
        fill="#b45309">Metrics / Logs / Traces / Alerting</text>
</svg>