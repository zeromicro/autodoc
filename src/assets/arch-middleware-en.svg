<svg viewBox="0 0 750 150" width="750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }</style>

  <!-- Group 1: Server-Wide — x=15, y=15, w=185, h=118 -->
  <rect x="15" y="15" width="185" height="118" rx="8" fill="#fef3c7" fill-opacity="0.25" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="107" y="35" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle">Server-Wide</text>
  <text x="107" y="49" font-size="9" fill="#b45309" text-anchor="middle">(rest.Use)</text>
  <!-- Items -->
  <rect x="30" y="58" width="155" height="22" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="107" y="73" font-size="10" fill="#b45309" text-anchor="middle">RecoverHandler</text>
  <text x="107" y="87" font-size="8" fill="#94a3b8" text-anchor="middle">↓</text>
  <rect x="30" y="92" width="155" height="22" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="107" y="107" font-size="10" fill="#b45309" text-anchor="middle">PrometheusHandler</text>
  <text x="107" y="121" font-size="8" fill="#94a3b8" text-anchor="middle">↓</text>
  <rect x="30" y="114" width="155" height="0" rx="4" fill="none" stroke="none"/>
  <text x="107" y="127" font-size="10" fill="#b45309" text-anchor="middle" font-weight="500">TracingHandler</text>

  <!-- Arrow Group1 → Group2 -->
  <path d="M205,74 Q218,74 228,74" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Group 2: Per-Route — x=235, y=15, w=185, h=118 -->
  <rect x="235" y="15" width="185" height="118" rx="8" fill="#d1fae5" fill-opacity="0.25" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="327" y="35" font-size="11" font-weight="600" fill="#166534" text-anchor="middle">Per-Route</text>
  <text x="327" y="49" font-size="9" fill="#166534" text-anchor="middle">(@server middleware)</text>
  <!-- Items -->
  <rect x="250" y="58" width="155" height="22" rx="4" fill="#d1fae5" stroke="#22c55e" stroke-width="1"/>
  <text x="327" y="73" font-size="10" fill="#166534" text-anchor="middle">Auth</text>
  <text x="327" y="87" font-size="8" fill="#94a3b8" text-anchor="middle">↓</text>
  <rect x="250" y="92" width="155" height="22" rx="4" fill="#d1fae5" stroke="#22c55e" stroke-width="1"/>
  <text x="327" y="107" font-size="10" fill="#166534" text-anchor="middle">AccessLog</text>
  <text x="327" y="121" font-size="8" fill="#94a3b8" text-anchor="middle">↓</text>
  <text x="327" y="127" font-size="10" fill="#166534" text-anchor="middle" font-weight="500">Custom...</text>

  <!-- Arrow Group2 → Group3 -->
  <path d="M425,74 Q438,74 448,74" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Group 3: Built-In Safety — x=455, y=15, w=185, h=118 -->
  <rect x="455" y="15" width="185" height="118" rx="8" fill="#dbeafe" fill-opacity="0.25" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="547" y="35" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Built-In Safety</text>
  <text x="547" y="49" font-size="9" fill="#1e40af" text-anchor="middle">(always runs last)</text>
  <!-- Items -->
  <rect x="470" y="58" width="155" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="547" y="73" font-size="10" fill="#1e40af" text-anchor="middle">TimeoutHandler</text>
  <text x="547" y="87" font-size="8" fill="#94a3b8" text-anchor="middle">↓</text>
  <rect x="470" y="92" width="155" height="22" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="547" y="107" font-size="10" fill="#1e40af" text-anchor="middle">SheddingHandler</text>
  <text x="547" y="121" font-size="8" fill="#94a3b8" text-anchor="middle">↓</text>
  <text x="547" y="127" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="500">RateLimitHandler</text>

  <!-- Arrow Group3 → Handler -->
  <path d="M645,74 Q658,74 668,74" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Handler — x=675, y=56, w=60, h=36 -->
  <rect x="675" y="56" width="60" height="36" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="705" y="79" font-size="11" fill="#9d174d" text-anchor="middle" font-weight="600">Handler</text>
</svg>
