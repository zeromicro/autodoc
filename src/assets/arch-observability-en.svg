<svg viewBox="0 0 700 220" width="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
  </defs>
  <style>text { font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif; }</style>

  <!-- === Left: Your Service group — x=15, y=20, w=180, h=180 === -->
  <rect x="15" y="20" width="180" height="180" rx="8" fill="#fef3c7" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="105" y="40" font-size="10" fill="#b45309" text-anchor="middle" font-weight="600">Your Service</text>

  <!-- Handler — x=35, y=52, w=140, h=32 -->
  <rect x="35" y="52" width="140" height="32" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="105" y="73" font-size="10" fill="#b45309" text-anchor="middle">Handler</text>

  <!-- Arrow Handler → Logic -->
  <path d="M105,89 Q105,97 105,103" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Logic — x=35, y=110, w=140, h=32 -->
  <rect x="35" y="110" width="140" height="32" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="105" y="131" font-size="10" fill="#b45309" text-anchor="middle">Logic</text>

  <!-- Arrow Logic → DB/RPC -->
  <path d="M105,147 Q105,155 105,163" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DB/RPC — x=35, y=168, w=140, h=28 -->
  <rect x="35" y="168" width="140" height="28" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="105" y="187" font-size="10" fill="#b45309" text-anchor="middle">DB / RPC</text>

  <!-- === Middle: Auto-instrumented collectors === -->

  <!-- Arrow: Handler → LOG -->
  <path d="M180,68 C210,68 230,40 243,40" fill="none" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="220" y="42" font-size="8" fill="#94a3b8" text-anchor="middle">access log</text>

  <!-- Arrow: Handler → PROM -->
  <path d="M180,72 C220,72 230,110 243,110" fill="none" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="220" y="96" font-size="8" fill="#94a3b8" text-anchor="middle">http_duration</text>

  <!-- Arrow: Handler → TRACE -->
  <path d="M180,76 C210,90 230,175 243,175" fill="none" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="218" y="145" font-size="8" fill="#94a3b8" text-anchor="middle">span + trace ID</text>

  <!-- Arrow: Logic → PROM (metrics) -->
  <path d="M180,126 C220,126 230,118 243,118" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="225" y="134" font-size="8" fill="#94a3b8" text-anchor="middle">sql_duration</text>

  <!-- Arrow: DB → TRACE (child spans) -->
  <path d="M180,182 C220,182 230,182 243,182" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === Collectors (middle column) === -->

  <!-- LOG — x=250, y=25, w=155, h=32 -->
  <rect x="250" y="25" width="155" height="32" rx="6" fill="#d1fae5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="327" y="46" font-size="10" fill="#166534" text-anchor="middle">Log Collector (ELK / Loki)</text>

  <!-- PROM — x=250, y=95, w=155, h=32 -->
  <rect x="250" y="95" width="155" height="32" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="327" y="116" font-size="10" fill="#1e40af" text-anchor="middle">Prometheus</text>

  <!-- TRACE — x=250, y=164, w=155, h=32 -->
  <rect x="250" y="164" width="155" height="32" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="327" y="185" font-size="10" fill="#6b21a8" text-anchor="middle">Jaeger / Zipkin</text>

  <!-- === Right: Visualization === -->

  <!-- Arrows to Grafana -->
  <path d="M410,41 C440,41 470,85 483,85" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M410,111 Q445,111 483,100" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M410,180 C440,180 470,115 483,115" fill="none" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Grafana — x=490, y=78, w=120, h=44 -->
  <rect x="490" y="78" width="120" height="44" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="550" y="100" font-size="12" fill="#9d174d" text-anchor="middle" font-weight="600">Grafana</text>
  <text x="550" y="115" font-size="9" fill="#9d174d" text-anchor="middle">Dashboard</text>

  <!-- Legend -->
  <text x="640" y="40" font-size="8" fill="#94a3b8" text-anchor="end">── request</text>
  <text x="640" y="54" font-size="8" fill="#94a3b8" text-anchor="end">┄┄ auto</text>
</svg>
