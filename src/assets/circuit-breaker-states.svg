<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 170" width="600">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 L2,4 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="170" rx="12" fill="#f8fafc"/>

  <!-- Title: y = 15 + 16*0.75 = 27 -->
  <text x="300" y="27" font-size="16" font-weight="600" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#1e293b">熔断器状态</text>

  <!-- Row 1: 正常 — 请求 → RPC 调用 → 响应 -->
  <text x="25" y="60" font-size="10" font-weight="600"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">正常</text>
  <rect x="80" y="45" width="80" height="30" rx="5" fill="#d1fae5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="120" y="64" font-size="11" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">请求</text>
  <path d="M165,60 Q 184,60 203,60" fill="none" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <rect x="210" y="45" width="100" height="30" rx="5" fill="#d1fae5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="260" y="64" font-size="11" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">RPC 调用</text>
  <path d="M315,60 Q 334,60 353,60" fill="none" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <rect x="360" y="45" width="80" height="30" rx="5" fill="#d1fae5" stroke="#22c55e" stroke-width="1.2"/>
  <text x="400" y="64" font-size="11" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#166534">响应</text>

  <!-- Row 2: 断开 — 请求 → 立即 503 -->
  <text x="25" y="105" font-size="10" font-weight="600"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#dc2626">断开</text>
  <rect x="80" y="90" width="80" height="30" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="120" y="109" font-size="11" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#9d174d">请求</text>
  <path d="M165,105 Q 184,105 203,105" fill="none" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <rect x="210" y="90" width="200" height="30" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="310" y="109" font-size="11" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#9d174d">立即返回 503（不发 RPC）</text>

  <!-- Row 3: 半开 — 单个探测请求 -->
  <text x="25" y="150" font-size="10" font-weight="600"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#b45309">半开</text>
  <rect x="80" y="135" width="80" height="30" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="120" y="154" font-size="11" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#b45309">请求</text>
  <path d="M165,150 Q 184,150 203,150" fill="none" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <rect x="210" y="135" width="250" height="30" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="335" y="154" font-size="11" text-anchor="middle"
        font-family="PingFang SC, Microsoft YaHei, system-ui, sans-serif" fill="#b45309">允许单个探测请求检查恢复情况</text>
</svg>
